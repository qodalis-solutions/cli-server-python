name: Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test tools
        run: pip install build pytest pytest-asyncio httpx

      - name: Install packages for testing
        run: |
          pip install ./packages/abstractions
          pip install ./plugins/filesystem
          pip install ./plugins/filesystem-json
          pip install ./plugins/filesystem-sqlite
          pip install ./plugins/filesystem-s3
          pip install ./plugins/weather
          pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build abstractions package
        run: python -m build packages/abstractions/ --outdir dist-abstractions/

      - name: Publish abstractions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-abstractions/
          skip-existing: true

      - name: Build server package
        run: python -m build

      - name: Publish server to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

      # -- Plugin packages --

      - name: Build filesystem plugin
        run: python -m build plugins/filesystem/ --outdir dist-plugin-filesystem/

      - name: Publish filesystem plugin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-plugin-filesystem/
          skip-existing: true

      - name: Build filesystem-json plugin
        run: python -m build plugins/filesystem-json/ --outdir dist-plugin-filesystem-json/

      - name: Publish filesystem-json plugin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-plugin-filesystem-json/
          skip-existing: true

      - name: Build filesystem-sqlite plugin
        run: python -m build plugins/filesystem-sqlite/ --outdir dist-plugin-filesystem-sqlite/

      - name: Publish filesystem-sqlite plugin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-plugin-filesystem-sqlite/
          skip-existing: true

      - name: Build filesystem-s3 plugin
        run: python -m build plugins/filesystem-s3/ --outdir dist-plugin-filesystem-s3/

      - name: Publish filesystem-s3 plugin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-plugin-filesystem-s3/
          skip-existing: true

      - name: Build weather plugin
        run: python -m build plugins/weather/ --outdir dist-plugin-weather/

      - name: Publish weather plugin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist-plugin-weather/
          skip-existing: true

  docker:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
